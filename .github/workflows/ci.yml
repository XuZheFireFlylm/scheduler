name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: false
        default: 'test'

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Diagnose environment
        run: |
          echo "=== Environment ==="
          python --version
          pip --version
          echo "=== Files ==="
          ls -la
          echo "=== requirements.txt ==="
          cat requirements.txt || echo "(not found)"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt || pip install --no-deps -r requirements.txt || true

      - name: Lint
        run: pip install ruff && ruff check app/ --ignore E501 || true

      - name: Test
        run: |
          if [ -d "tests" ]; then
            pip install pytest pytest-asyncio httpx aiosqlite
            pytest tests/ -v --tb=short || true
          else
            echo "No tests/ directory found — skipping"
          fi
