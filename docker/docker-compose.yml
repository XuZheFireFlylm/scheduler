version: "3.9"

services:
  # ─── 调度中心 API ───────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://firefly:firefly_secret@postgres:5432/firefly
      - REDIS_URL=redis://redis:6379/0
      - S3_ENDPOINT=http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─── PostgreSQL ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: firefly
      POSTGRES_PASSWORD: firefly_secret
      POSTGRES_DB: firefly
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U firefly"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis（任务队列缓存 + 心跳存储）───────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  # ─── MinIO（S3兼容对象存储，存模型权重+训练数据）───────────────────────
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: firefly_access
      MINIO_ROOT_PASSWORD: firefly_secret
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"

  # ─── 创建默认桶（启动后自动执行）────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 firefly_access firefly_secret;
      mc mb myminio/firefly-models --ignore-existing;
      mc anonymous set download myminio/firefly-models;
      exit 0;
      "

volumes:
  pgdata:
  redisdata:
  miniodata:
